; ImpressionistLLM Configuration File
; This is a template configuration file. Copy to settings.ini and customize.
;
; API Key Priority:
; 1. Environment variable: OPENROUTER_API_KEY
; 2. This file: [API] APIKey=...
;
; Get your API key from: https://openrouter.ai/keys

[API]
; Your OpenRouter API key (or set OPENROUTER_API_KEY environment variable)
APIKey=YOUR_API_KEY_HERE
; Default model for LLM requests
DefaultModel=openai/gpt-5.5

[OpenRouter]
; Provider routing controls. These ship with broadly compatible defaults.
; The previous build defaulted ProviderZDR=true and AllowFallbacks=false,
; which restricted requests to a single ZDR-certified provider per model and
; caused widespread "model or endpoint not found" (503) and "too many requests"
; (429) errors. The defaults below restore normal routing while still refusing
; providers that train on prompts.
;
; ProviderDataCollection=deny  : refuse providers that may train on or store prompts.
; ProviderZDR=false            : do NOT restrict to Zero Data Retention providers.
;                                Flip to true ONLY when shipping PHI; expect
;                                reduced availability and more 503/429 errors.
; AllowFallbacks=true          : let OpenRouter fall back to another compliant
;                                provider when the primary is down/throttled.
;                                Set to false to hard-pin the primary provider.
; ProviderSort                 : optional. Blank = OpenRouter's default routing.
;                                Use "price", "throughput", or "latency" to
;                                force a sort order.
ProviderDataCollection=deny
ProviderZDR=false
AllowFallbacks=true
ProviderSort=

[Application]
; Maximum edge length for screenshots (pixels)
ScreenshotMaxEdge=1600
; Enable debug mode
DebugMode=false
; Maximum clipboard size (bytes)
MaxClipboardSize=262144
; Clipboard operation timeout (milliseconds)
ClipboardTimeout=1500

[Server]
; Local HTTP server port
Port=58080
; Local HTTP server host
Host=127.0.0.1
; Enable local server
Enabled=true

[Vision]
; Vision model (defaults to API.DefaultModel if empty)
Model=openai/gpt-5.5

[Logging]
; Enable file logging
Enabled=false
; Log directory
LogDirectory=logs

[Paths]
; Paths are relative to the application directory unless absolute
Prompts=prompts
Logs=logs
Temp=temp
Processors=prompts/processors
[UI]
ProcessingX=1152
ProcessingY=1384
